name: Azure MERN Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Build Frontend
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # 2. Build Backend
      - name: Build Backend
        run: |
          cd backend
          npm install

      # 3. Deploy to Azure
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'YOUR_APP_NAME' # Replace with your Azure Web App name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .